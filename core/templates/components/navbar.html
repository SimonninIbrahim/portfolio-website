{% load static %}

<!--
    SITE HEADER
    Fixed navigation area displayed above all sections.
    Contains the portfolio logo and the Contact popup trigger.
-->
<div class="site-header">

<!-- Portfolio logo -->
    <div class="brand-logo">
        <img src="{% static 'images/Logo.png' %}" alt="Logo">
    </div>

<!-- Opens the contact popup window -->
    <button type="button" class="header-contact-btn" id="open-contact-popup">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Contact</span>
    </button>

</div>
